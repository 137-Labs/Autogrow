<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#0a1a0a"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>AutoGrow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#071007;--bg2:#0d1a0d;--bg3:#142014;
  --green:#4ade80;--green2:#22c55e;--green3:#166534;
  --yellow:#facc15;--orange:#fb923c;--red:#f87171;
  --purple:#a78bfa;--blue:#60a5fa;--teal:#2dd4bf;
  --text:#e8f5e8;--text2:#9cbf9c;--text3:#4a6b4a;
  --border:#1a2e1a;--border2:#243824;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
input,select,button,textarea{font-family:'DM Sans',sans-serif;-webkit-appearance:none}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:#1a2e1a;border-radius:2px}

/* Tab bar */
.tbar{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg2);border-bottom:1px solid var(--border2);padding:0 6px}
.tbar::-webkit-scrollbar{display:none}
.tbar button{flex-shrink:0;padding:11px 12px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text3);font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s}
.tbar button.active{color:var(--green);border-bottom-color:var(--green);font-weight:600}

/* Inputs */
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:12px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:#4ade8040}
.inp-sm{background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;outline:none}

/* Buttons */
.btn{border:none;border-radius:12px;padding:12px 18px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-green{background:var(--green);color:#071007}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text2)}
.btn-red{background:#f8717120;color:#f87171;border:1.5px solid #f8717130}

/* Labels */
.lbl{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;font-family:'DM Mono',monospace}

/* Cards */
.card{background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;overflow:hidden}
.card-pad{padding:14px 16px}

/* Modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1.5px solid var(--border2);border-radius:22px 22px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-handle{width:32px;height:3px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.chip{display:flex;align-items:center;gap:10px;font-size:13px;border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;user-select:none;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2)}
.chip.on{background:rgba(74,222,128,0.13);border-color:#4ade80;color:var(--green)}
.chip input[type=checkbox]{width:20px;height:20px;flex-shrink:0;accent-color:var(--green);pointer-events:none}
.chip-btn{width:100%;text-align:left;border-radius:10px;padding:10px 12px;margin-bottom:10px;cursor:pointer;font-size:13px;font-weight:600;background:var(--bg3);border:1.5px solid var(--border2);color:var(--text2)}
.chip-btn.on{background:rgba(74,222,128,0.13);border-color:#4ade80;color:var(--green)}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--green);color:#071007;padding:10px 20px;border-radius:100px;font-size:13px;font-weight:600;z-index:9999;display:none;white-space:nowrap}

/* Progress */
.pt{background:var(--border);border-radius:100px;overflow:hidden}
.pb{border-radius:100px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* Stage colors */
.stage-seed{color:#facc15}
.stage-seedling{color:#86efac}
.stage-veg{color:#4ade80}
.stage-preflower{color:#fb923c}
.stage-flower{color:#a78bfa}
.stage-flush{color:#60a5fa}
.stage-harvest{color:#f87171}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

select option{background:var(--bg2);color:var(--text)}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
"use strict";
var LS="autogrow-v1";
function loadD(){
  try{var r=localStorage.getItem(LS);if(!r)return null;return JSON.parse(r);}catch(e){return null;}
}
function saveD(d){try{localStorage.setItem(LS,JSON.stringify(d));return true;}catch(e){if(typeof showToast==="function")showToast("⚠️ Storage full — delete some old photos to keep saving","#f87171");return false;}}

function downloadBackup(){
  try{
    var payload={app:"AutoGrow",backupVersion:1,exportedAt:new Date().toISOString(),data:D};
    var blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    var stamp=tod().replace(/-/g,"");
    a.href=url;
    a.download="autogrow-backup-"+stamp+".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    showToast("💾 Backup downloaded");
  }catch(e){
    showToast("⚠️ Backup failed — try again","#f87171");
  }
}

function handleRestoreFile(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var parsed;
    try{parsed=JSON.parse(e.target.result);}catch(err){
      showToast("⚠️ That file isn't valid — couldn't read it","#f87171");
      input.value="";
      return;
    }
    var incoming=parsed&&parsed.data?parsed.data:parsed;
    if(!incoming||typeof incoming!=="object"||!Array.isArray(incoming.plants)){
      showToast("⚠️ That doesn't look like an AutoGrow backup","#f87171");
      input.value="";
      return;
    }
    var plantCount=incoming.plants.length;
    var exportedAt=parsed&&parsed.exportedAt?new Date(parsed.exportedAt).toLocaleString():"unknown date";
    if(!confirm("Restore backup from "+exportedAt+"?\n\nThis backup has "+plantCount+" plant"+(plantCount!==1?"s":"")+". This will REPLACE everything currently in the app — your current data will be gone unless you've backed it up too.\n\nContinue?")){
      input.value="";
      return;
    }
    D=incoming;
    if(!D.logs)D.logs={};
    if(!D.pantry)D.pantry=[];
    if(!D.checklistDone)D.checklistDone={};
    if(!D.setup)D.setup={};
    if(!D.setup.perpetualZones)D.setup.perpetualZones=[];
    if(!D.setup.zonePotSizes)D.setup.zonePotSizes={};
    saveD(D);
    input.value="";
    render();
    showToast("✅ Restored "+plantCount+" plant"+(plantCount!==1?"s":"")+" from backup");
  };
  reader.readAsText(file);
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function tod(){return new Date().toISOString().slice(0,10);}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function showToast(m,c){var t=document.getElementById("toast");t.textContent=m;t.style.background=c||"var(--green)";t.style.color=c?"#fff":"#071007";t.style.display="block";setTimeout(function(){t.style.display="none";},2500);}
function daysSince(dateStr){if(!dateStr)return 0;var d=new Date(dateStr),n=new Date();return Math.floor((n-d)/(1000*60*60*24));}
function addDays(dateStr,n){var d=new Date(dateStr);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function plantTotalDays(p){if(p.harvestDate)return daysBetween(p.startDate,p.harvestDate);return Number(p.totalDays)||77;}

// ── Stage calculator (cannabis - has a hard life cycle) ──
function getStageCannabis(days,totalDays,isCutting){
  totalDays=totalDays||77;
  if(!isCutting){
    if(days<=3)return{name:"Germination",key:"seed",icon:"🌰",color:"#facc15",tip:"Keep moist and warm 20-25°C. No nutrients. No direct light needed yet."};
    if(days<=14)return{name:"Seedling",key:"seedling",icon:"🌱",color:"#86efac",tip:"Gentle light 18/6. Water sparingly. No nutrients yet. Watch for first true leaves."};
  }else{
    if(days<=10)return{name:"Rooting (cutting)",key:"rooting",icon:"🌱",color:"#86efac",tip:"Keep humidity high while roots establish. No nutrients until roots form, then quarter-strength feed."};
  }
  if(days<=28)return{name:"Vegetative",key:"veg",icon:"🌿",color:"#4ade80",tip:"18/6 light. Start light nutrients. Water when top inch of soil is dry."};
  if(days<=35)return{name:"Pre-Flower",key:"preflower",icon:"🌸",color:"#fb923c",tip:"Auto-flower triggering. Increase P+K. Watch for white pistils. Stretch incoming."};
  if(days<=(totalDays-10))return{name:"Flowering",key:"flower",icon:"🌺",color:"#a78bfa",tip:"Full bloom nutrients. Watch for amber trichomes near harvest. Maintain humidity below 50%."};
  if(days<=(totalDays-3))return{name:"Flush",key:"flush",icon:"💧",color:"#60a5fa",tip:"Plain pH water only. Remove all nutrients. Flush 3-7 days before harvest."};
  return{name:"Harvest Ready",key:"harvest",icon:"✂️",color:"#f87171",tip:"Check trichomes: mostly cloudy = peak THC. Amber trichomes = more body effect."};
}

// ── Basil: no hard life cycle. Grows to established, then harvest-as-needed forever ──
function getStageBasil(days,isCutting){
  if(!isCutting){
    if(days<=7)return{name:"Germination",key:"seed",icon:"🌰",color:"#facc15",tip:"Keep moist and warm. No nutrients needed yet."};
    if(days<=21)return{name:"Seedling",key:"seedling",icon:"🌱",color:"#86efac",tip:"Gentle light. Water sparingly. Light feed can start around week 3."};
  }else{
    if(days<=7)return{name:"Rooting (cutting)",key:"rooting",icon:"🌱",color:"#86efac",tip:"Keep humidity high while roots establish. No nutrients yet."};
  }
  return{name:"Established — harvest as needed",key:"established",icon:"🌿",color:"#4ade80",tip:"No further life-cycle stages. Pinch top leaves regularly to keep it bushy and producing. Harvest whenever you need it."};
}

// ── Tomato: matures once, then ongoing fruit cycles indefinitely ──
function getStageTomato(days,isCutting,fruitingStartDate){
  if(!isCutting){
    if(days<=10)return{name:"Germination",key:"seed",icon:"🌰",color:"#facc15",tip:"Keep moist and warm. No nutrients yet."};
    if(days<=21)return{name:"Seedling",key:"seedling",icon:"🌱",color:"#86efac",tip:"Gentle light. Light feed can start around week 3."};
  }else{
    if(days<=10)return{name:"Rooting (cutting)",key:"rooting",icon:"🌱",color:"#86efac",tip:"Keep humidity high while roots establish."};
  }
  if(days<=42)return{name:"Vegetative — vine training",key:"veg",icon:"🌿",color:"#4ade80",tip:"Top after 4-5 nodes. Weave vines horizontally under the net."};
  if(fruitingStartDate){
    var fDays=daysSince(fruitingStartDate);
    return{name:"Producing (fruiting "+fDays+"d)",key:"producing",icon:"🍅",color:"#fb923c",tip:"No further life-cycle stages. Ongoing fruit sets — keep feeding steady, harvest tomatoes as they ripen."};
  }
  return{name:"Flowering — fruit set incoming",key:"flowerset",icon:"🌸",color:"#fb923c",tip:"First flowers forming. Once you see fruit, mark 'Fruiting Started' on this plant."};
}

// ── Dispatcher: routes to the right stage logic by plant type ──
// ── Generic static/forever plant — for any type marked isStatic ──
function getStageStatic(days,isCutting){
  if(!isCutting){
    if(days<=10)return{name:"Germination",key:"seed",icon:"🌰",color:"#facc15",tip:"Keep moist and warm. No nutrients yet."};
    if(days<=21)return{name:"Seedling",key:"seedling",icon:"🌱",color:"#86efac",tip:"Gentle light. Light feed can start around week 3."};
  }else{
    if(days<=10)return{name:"Rooting (cutting)",key:"rooting",icon:"🌱",color:"#86efac",tip:"Keep humidity high while roots establish. No nutrients yet."};
  }
  return{name:"Established — ongoing",key:"established",icon:"🌿",color:"#4ade80",tip:"No further life-cycle stages. This plant lives in the tent — feed lightly and harvest as needed."};
}

function getStageFor(plant,days,totalDays){
  var type=plant.plantType||"cannabis";
  if(plant.isStatic&&type!=="basil"&&type!=="tomato")return getStageStatic(days,plant.isCutting);
  if(type==="basil")return getStageBasil(days,plant.isCutting);
  if(type==="tomato")return getStageTomato(days,plant.isCutting,plant.fruitingStartDate);
  return getStageCannabis(days,totalDays,plant.isCutting);
}

// Shared check: is this plant past its growth phase and now in ongoing/no-harvest-cycle mode?
function plant_isOngoing(p,stage){
  if(p.plantType==="basil"&&stage.key==="established")return true;
  if(p.plantType==="tomato"&&stage.key==="producing")return true;
  if(p.isStatic&&stage.key==="established")return true;
  return false;
}

// Back-compat: old call sites that only know cannabis logic
function getStage(days,totalDays){return getStageCannabis(days,totalDays,false);}

function getWeeklyTips(days,setup){
  var week=Math.floor(days/7)+1;
  var tips=[];
  if(days<7)tips.push({icon:"💧",text:"Water gently - small amounts only. No runoff needed yet."});
  if(days>=7&&days<14)tips.push({icon:"🌡️",text:"Keep temp 22-26°C day, 18-22°C night. Humidity 60-70%."});
  if(days>=14&&days<21)tips.push({icon:"🧪",text:"Start TerraCanna Starter at 25% dose. pH 6.0-6.5 if possible."});
  if(days>=21&&days<35)tips.push({icon:"🪴",text:"Plants in full veg. Increase TerraCanna Grow. Watering every 2-3 days."});
  if(days>=35&&days<49)tips.push({icon:"🌸",text:"Pre-flower stretch. Switch to TerraCanna Bloom. Reduce nitrogen."});
  if(days>=49)tips.push({icon:"🌺",text:"Full flower. Max PK boost. Check for deficiencies. Reduce humidity to 45%."});
  if(days>=63)tips.push({icon:"🔍",text:"Start checking trichomes weekly with loupe or microscope."});
  if(!setup.phing)tips.push({icon:"📱",text:"Getting a pH pen this week would really help — pH 6.0-6.5 for soil."});
  return tips;
}

// ── Terra Canna feed chart ───────────────────────────────
// ── Real nutrient product database ───────────────────────
// Each brand has bottles with their own per-phase ml/L curve (low/mid/high = early/mid/late within that phase).
// Phases: rooting, veg, transition, flower, lateFlower, flush
var NUTRIENT_BRANDS={
  canna_terra:{
    label:"CANNA Terra",
    starterPackBottles:["terra_vega","terra_flores","rhizotonic","cannazym","boost","pk1314"],
    bottles:{
      terra_vega:{name:"Terra Vega",role:"base-veg",unit:"ml/L",
        dose:{rooting:0,veg:[1.5,3,5.5],transition:5.5,flower:0,lateFlower:0,flush:0}},
      terra_flores:{name:"Terra Flores",role:"base-flower",unit:"ml/L",
        dose:{rooting:0,veg:0,transition:0,flower:[5,6,7],lateFlower:7,flush:0}},
      rhizotonic:{name:"Rhizotonic",role:"addon-root",unit:"ml/L",
        dose:{rooting:0.5,veg:2,transition:0.5,flower:0.5,lateFlower:0,flush:0}},
      cannazym:{name:"Cannazym",role:"addon-enzyme",unit:"ml/L",
        dose:{rooting:0,veg:2.5,transition:2.5,flower:2.5,lateFlower:2.5,flush:0}},
      boost:{name:"Boost Accelerator",role:"addon-bloom",unit:"ml/L",
        dose:{rooting:0,veg:0,transition:0.4,flower:0.4,lateFlower:0.4,flush:0}},
      pk1314:{name:"PK 13/14",role:"addon-pk",unit:"ml/L",
        dose:{rooting:0,veg:0,transition:0,flower:0,lateFlower:1.5,flush:0}},
      calmag:{name:"CalMag",role:"addon-calmag",unit:"ml/L",
        dose:{rooting:0.5,veg:1,transition:1,flower:1,lateFlower:1,flush:0}}
    }
  },
  biobizz:{
    label:"BioBizz",
    starterPackBottles:["bio_grow","bio_bloom","top_max"],
    bottles:{
      bio_grow:{name:"Bio·Grow",role:"base-veg",unit:"ml/L",
        dose:{rooting:0,veg:[1,2,4],transition:2,flower:1,lateFlower:0,flush:0}},
      bio_bloom:{name:"Bio·Bloom",role:"base-flower",unit:"ml/L",
        dose:{rooting:0,veg:0,transition:1,flower:[2,3,4],lateFlower:4,flush:0}},
      top_max:{name:"Top Max",role:"addon-bloom",unit:"ml/L",
        dose:{rooting:0,veg:0,transition:1,flower:2,lateFlower:4,flush:0}},
      root_juice:{name:"Root·Juice",role:"addon-root",unit:"ml/L",
        dose:{rooting:2,veg:2,transition:1,flower:0,lateFlower:0,flush:0}},
      fish_mix:{name:"Fish·Mix",role:"addon-veg-alt",unit:"ml/L",
        dose:{rooting:0,veg:[1,2,4],transition:2,flower:1,lateFlower:0,flush:0}},
      bio_heaven:{name:"Bio·Heaven",role:"addon-booster",unit:"ml/L",
        dose:{rooting:0,veg:1,transition:1,flower:1,lateFlower:1,flush:0}},
      calmag:{name:"CalMag",role:"addon-calmag",unit:"ml/L",
        dose:{rooting:0.5,veg:1,transition:1,flower:1,lateFlower:1,flush:0}}
    }
  },
  custom:{
    label:"Custom (your own bottles)",
    starterPackBottles:[],
    bottles:{} // populated from D.setup.customBottles
  }
};

// ── Map a plant's day count + type to a generic growth phase ──
// This is brand-agnostic; brands just plug their ml/L curve into whichever phase applies.
function getNutrientPhase(plant,days,stage){
  var type=plant.plantType||"cannabis";
  if(plant.isCutting&&days<=10)return"rooting";
  if(type==="basil"){
    if(stage.key==="established")return"veg"; // basil never really "flowers" for nutrient purposes
    return days<=21?"rooting":"veg";
  }
  if(type==="tomato"){
    if(stage.key==="flowerset")return"transition";
    if(stage.key==="producing")return"lateFlower"; // ongoing fruiting = sustained P/K
    return days<=42?"veg":"transition";
  }
  // cannabis / other / static
  if(stage.key==="flush")return"flush";
  if(stage.key==="harvest")return"flush";
  if(stage.key==="flower")return(stage.tip&&days>0)?"flower":"flower";
  if(stage.key==="preflower")return"transition";
  if(stage.key==="veg")return"veg";
  return"rooting";
}

// Resolve a dose value (number or [low,mid,high] array) to a single ml/L for this point in the phase
function resolveDose(doseVal,phaseProgress){
  if(typeof doseVal==="number")return doseVal;
  if(Array.isArray(doseVal)){
    if(phaseProgress<=0.33)return doseVal[0];
    if(phaseProgress<=0.66)return doseVal[1]!==undefined?doseVal[1]:doseVal[0];
    return doseVal[doseVal.length-1];
  }
  return 0;
}

// ── Build the actual feed plan for a plant using whichever bottles the user has selected ──
function getNutrientStrengthMultiplier(plant){
  if((plant.plantType||"cannabis")!=="cannabis")return 1;
  // Autoflowers need roughly 25-50% of photoperiod nutrient strength; 50% is the safe default,
  // most growers start here and increase only if the plant shows deficiency signs.
  if((plant.flowerType||"auto")==="auto")return 0.5;
  return 1; // photoperiod gets full strength
}

function getRealFeedPlan(plant,days,stage){
  var pantry=D.pantry||[];
  if(!pantry.length)return null;
  var phase=getNutrientPhase(plant,days,stage);
  var phaseProgress=Math.min(1,((days%14)/14));
  var strengthMult=getNutrientStrengthMultiplier(plant);
  var bottleDoses=pantry.map(function(item){
    var dose=item.dose?item.dose[phase]:0;
    var ml=resolveDose(dose,phaseProgress)*strengthMult;
    ml=Math.round(ml*10)/10;
    if(ml<=0)return null;
    return{pantryId:item.id,name:item.name,brandKey:item.brandKey,bottleKey:item.bottleKey,mlPerL:ml,remainingMl:item.remainingMl,sizeMl:item.sizeMl};
  }).filter(Boolean);
  var brandLabels=Array.from(new Set(pantry.map(function(i){return NUTRIENT_BRANDS[i.brandKey]?NUTRIENT_BRANDS[i.brandKey].label:i.brandKey;})));
  return{brandLabel:brandLabels.join(" + "),phase:phase,bottles:bottleDoses,strengthMult:strengthMult};
}

var TERRA_CANNA=[
  {week:1,stage:"Seedling",starter:0,grow:0,bloom:0,pk:0,booster:0,note:"Water only"},
  {week:2,stage:"Seedling",starter:1,grow:0,bloom:0,pk:0,booster:0,note:"25% dose"},
  {week:3,stage:"Veg",starter:2,grow:1,bloom:0,pk:0,booster:0,note:"Introduce Grow"},
  {week:4,stage:"Veg",starter:0,grow:2,bloom:0,pk:0,booster:0,note:"Full Grow"},
  {week:5,stage:"Pre-flower",starter:0,grow:1,bloom:1,pk:0,booster:0,note:"Transition week"},
  {week:6,stage:"Flower",starter:0,grow:0,bloom:2,pk:0,booster:1,note:"Full Bloom"},
  {week:7,stage:"Flower",starter:0,grow:0,bloom:3,pk:1,booster:1,note:"Boost PK"},
  {week:8,stage:"Flower",starter:0,grow:0,bloom:3,pk:2,booster:1,note:"Peak flower"},
  {week:9,stage:"Flower",starter:0,grow:0,bloom:2,pk:2,booster:1,note:"Late flower"},
  {week:10,stage:"Flush",starter:0,grow:0,bloom:0,pk:0,booster:0,note:"Plain water flush"},
  {week:11,stage:"Harvest",starter:0,grow:0,bloom:0,pk:0,booster:0,note:"Harvest window"},
];

// ── Tomato feed chart (lighter N, steady through fruiting) ──
var TOMATO_FEED=[

// ── Learning layer: average past feed doses logged at this stage ──
function getLearnedFeed(plant,days){
  var logs=(D.logs[plant.id]||[]).filter(function(l){return l.fed&&l.nutrients&&l.nutrients.length;});
  if(!logs.length)return null;
  // group by week-of-grow so we compare same-stage history
  var targetWeek=Math.floor(days/7)+1;
  var sameStage=logs.filter(function(l){
    var logDays=daysSince(l.date)>=0?Math.floor((new Date(l.date)-new Date(plant.startDate))/86400000):0;
    var logWeek=Math.floor(logDays/7)+1;
    return logWeek===targetWeek;
  });
  var pool=sameStage.length?sameStage:logs;
  // flatten nutrient entries, average ml/L per nutrient name
  var byName={};
  pool.forEach(function(l){
    l.nutrients.forEach(function(n){
      if(!n.name)return;
      var key=n.name.trim().toLowerCase();
      if(!byName[key])byName[key]={name:n.name,total:0,count:0};
      byName[key].total+=Number(n.mlPerL)||0;
      byName[key].count++;
    });
  });
  var avgList=Object.keys(byName).map(function(k){
    var b=byName[k];
    return{name:b.name,avgMlPerL:Math.round((b.total/b.count)*10)/10};
  });
  if(!avgList.length)return null;
  return{matchedStage:sameStage.length>0,sampleSize:pool.length,nutrients:avgList};
}

// ── Perpetual harvest calculator (slot-based) ────────────
function getPerpetual(plants,setup){
  var numSlots=Number(setup.numSlots)||1;
  var avgDays=Number(setup.avgFlowerDays)||77;
  var active=(plants||[]).filter(function(p){return !p.harvested&&p.isPerpetual;});

  // Slot occupancy: each plant occupies a slot until its harvestDate
  var slots=[];
  for(var i=0;i<numSlots;i++)slots.push(null);
  // sort active plants by start date, assign to slots in order
  var sorted=active.slice().sort(function(a,b){return new Date(a.startDate)-new Date(b.startDate);});
  sorted.forEach(function(p,i){if(i<numSlots)slots[i]=p;});

  var openSlots=slots.filter(function(s){return s===null;}).length;
  var occupied=slots.map(function(p,idx){
    if(!p)return{idx:idx,empty:true,plant:null,harvestDate:null,remaining:0};
    var totalDays=plantTotalDays(p);
    var harvestDate=p.harvestDate||addDays(p.startDate,totalDays);
    var days=daysSince(p.startDate);
    return{idx:idx,empty:false,plant:p,harvestDate:harvestDate,remaining:Math.max(0,totalDays-days)};
  });

  // next harvest across all occupied slots
  var nextHarvest=null;
  occupied.forEach(function(o){
    if(!o.empty&&(!nextHarvest||o.remaining<nextHarvest.remaining)){
      nextHarvest={name:o.plant.name,remaining:o.remaining,date:o.harvestDate};
    }
  });

  // suggested next start date = earliest slot free date (today if already open)
  var freeDates=occupied.map(function(o){return o.empty?tod():o.harvestDate;});
  freeDates.sort();
  var startNextOn=freeDates[0]||tod();

  return{numSlots:numSlots,openSlots:openSlots,occupied:occupied,nextHarvest:nextHarvest,startNextOn:startNextOn};
}

// Position-based rotation across locked perpetual pots.
// Only ONE empty locked pot is "Plant Now" at a time, staggered by harvestGap
// from the most recently started plant among the locked pots.
function getZoneRotation(){
  var zones=(D.setup.perpetualZones||[]).slice();
  var gap=Number(D.setup.harvestGap)||35;
  if(!zones.length)return[];

  var statuses=zones.map(function(key){
    var p=D.plants.find(function(x){return !x.harvested&&x.position===key;});
    if(p){
      var totalDays=plantTotalDays(p);
      var days=daysSince(p.startDate);
      var harvestDate=p.harvestDate||addDays(p.startDate,totalDays);
      return{key:key,label:zoneLabel(key),plant:p,status:"growing",remaining:Math.max(0,totalDays-days),harvestDate:harvestDate};
    }
    return{key:key,label:zoneLabel(key),plant:null,status:"empty"};
  });

  // Most recent start date among plants currently in locked pots (growing or harvested-from-this-set isn't tracked, so use growing only + last known)
  var growing=statuses.filter(function(s){return s.status==="growing";});
  var mostRecentStart=null;
  growing.forEach(function(s){
    var sd=new Date(s.plant.startDate);
    if(!mostRecentStart||sd>mostRecentStart)mostRecentStart=sd;
  });

  var emptyOnes=statuses.filter(function(s){return s.status==="empty";});
  if(emptyOnes.length){
    if(!mostRecentStart){
      // nothing planted yet anywhere in rotation - first empty pot is plant-now
      emptyOnes[0].status="plant_now";
      emptyOnes[0].waitDays=0;
    }else{
      var nextPlantDate=addDays(mostRecentStart.toISOString().slice(0,10),gap);
      var daysUntil=Math.ceil((new Date(nextPlantDate)-new Date(tod()))/86400000);
      if(daysUntil<=0){
        emptyOnes[0].status="plant_now";
        emptyOnes[0].waitDays=0;
      }else{
        emptyOnes[0].status="waiting";
        emptyOnes[0].waitDays=daysUntil;
        emptyOnes[0].plantOn=nextPlantDate;
      }
      // any additional empty pots beyond the first wait behind it too
      for(var i=1;i<emptyOnes.length;i++){
        emptyOnes[i].status="waiting";
        emptyOnes[i].waitDays=emptyOnes[0].waitDays+(gap*i);
      }
    }
  }
  return statuses;
}

    var stage=getStageFor(p,days,totalDays);
    var isOngoing=plant_isOngoing(p,stage);
    var remaining=isOngoing?null:Math.max(0,totalDays-days);
    var pct=isOngoing?100:Math.min((days/totalDays)*100,100);
    var dist=getLightDistance(D.setup,stage);
    var water=getWaterSchedule(D.setup,stage,days);
    var plantLogs=D.logs[p.id]||[];
    var lastLog=plantLogs.length>0?plantLogs[plantLogs.length-1]:null;
    h+='<div class="card" style="margin-bottom:12px">';
    // Plant header
    h+='<div style="padding:14px 16px 12px;background:linear-gradient(135deg,var(--bg2),var(--bg3))">';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">';
    h+='<div>';
    h+='<div style="font-size:16px;font-weight:700;color:var(--text)">'+stage.icon+' '+esc(p.name)+'</div>';
    h+='<div style="font-size:12px;color:var(--text3);margin-top:2px;font-family:\'DM Mono\',monospace">'+esc(p.strain||"Unknown strain")+'</div>';
    h+='</div>';
    h+='<div style="text-align:right">';
    h+='<div style="font-size:22px;font-weight:800;color:'+stage.color+'">Day '+days+'</div>';
    h+='<div style="font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace">'+(isOngoing?"ongoing growth":remaining+" days left")+'</div>';
    h+='</div></div>';
    // Stage badge
    h+='<div style="display:inline-block;background:'+stage.color+'20;border:1px solid '+stage.color+'40;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600;color:'+stage.color+';margin-bottom:10px">'+stage.name+'</div>';
    // Progress bar (skipped for ongoing-growth plants)
    if(!isOngoing){
      h+='<div class="pt" style="height:6px;margin-bottom:4px"><div class="pb" style="width:'+pct+'%;background:linear-gradient(90deg,'+stage.color+','+stage.color+'99);height:6px"></div></div>';
      h+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace"><span>Seed</span><span>'+Math.round(pct)+'%</span><span>Harvest</span></div>';
    }
    h+='</div>';
    // Info grid
    h+='<div style="padding:12px 16px;display:grid;grid-template-columns:1fr 1fr;gap:8px;border-bottom:1px solid var(--border)">';
    h+=infoCell("💡","Light Distance",dist.min+"–"+dist.max+" cm");
    h+=infoCell("💧","Water",water);
    if(lastLog)h+=infoCell("📏","Last Height",lastLog.height?lastLog.height+"cm":"Not logged");
    h+=infoCell("📅","Start Date",p.startDate);
    h+=infoCell("✂️","Harvest Date",p.harvestDate||addDays(p.startDate,totalDays));
    h+='</div>';
    // Stage tip
    h+='<div style="padding:10px 16px;background:'+stage.color+'08;border-bottom:1px solid var(--border)">';
    h+='<div style="font-size:11px;font-weight:600;color:'+stage.color+';margin-bottom:3px">💡 '+stage.name+' Tip</div>';
    h+='<div style="font-size:12px;color:var(--text2);line-height:1.5">'+stage.tip+'</div>';
    h+='</div>';
    // Photo timeline strip
    var photoLogs=plantLogs.filter(function(l){return l.photo;}).slice(-6).reverse();
    if(photoLogs.length){
      h+='<div style="padding:10px 16px;border-bottom:1px solid var(--border)">';
      h+='<div style="font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace;margin-bottom:6px">📸 GROWTH PHOTOS</div>';
      h+='<div style="display:flex;gap:6px;overflow-x:auto">';
      photoLogs.forEach(function(l){
        h+='<img src="'+l.photo+'" onclick="viewPhotoFullscreen(\''+l.photo.replace(/'/g,"\\'")+'\',\''+p.id+'\',\''+l.id+'\')" style="width:64px;height:64px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer" title="'+l.date+'"/>';
      });
      h+='</div></div>';
    }
    // Actions
    h+='<div style="padding:10px 16px;display:flex;gap:8px">';
    h+='<button data-pid="'+p.id+'" onclick="openLog(this.dataset.pid)" style="flex:1;background:var(--green);color:#071007;border:none;border-radius:10px;padding:9px;font-weight:600;font-size:13px;cursor:pointer">+ Log Week</button>';
    h+='<button data-pid="'+p.id+'" onclick="openLogHistory(this.dataset.pid)" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:9px 12px;color:var(--text2);cursor:pointer;font-size:13px">📜</button>';
    h+='<button data-pid="'+p.id+'" onclick="openEditPlant(this.dataset.pid)" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:9px 12px;color:var(--text2);cursor:pointer;font-size:13px">✏️</button>';
    h+='<button data-pid="'+p.id+'" onclick="markHarvested(this.dataset.pid)" style="background:#fb923c15;border:1.5px solid #fb923c30;border-radius:10px;padding:9px 12px;color:#fb923c;cursor:pointer;font-size:13px">✂️</button>';
    h+='<button data-pid="'+p.id+'" onclick="deletePlant(this.dataset.pid)" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:9px 12px;color:var(--text3);cursor:pointer;font-size:13px">🗑️</button>';
    h+='</div>';
    h+='</div>';
  });
  return h;
}

function infoCell(icon,label,val){
  return '<div style="background:var(--bg3);border-radius:10px;padding:8px 10px"><div style="font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace;margin-bottom:2px">'+label+'</div><div style="font-size:12px;color:var(--text);font-weight:500">'+icon+' '+esc(val)+'</div></div>';
}

// ── MAP TAB ──────────────────────────────────────────────
function tabMap(){
  var h='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  h+='<div style="font-size:11px;color:var(--text3);font-family:\'DM Mono\',monospace">'+esc(D.setup.tentSize)+'cm · '+esc(D.setup.lightModel)+'</div>';
  h+='<button onclick="patch({showTentConfig:true})" style="background:none;border:1px solid var(--border2);border-radius:8px;padding:4px 9px;font-size:11px;color:var(--text3);cursor:pointer">⚙️ Configure</button>';
  h+='</div>';

  // Perpetual rotation status strip
  var rotation=getZoneRotation().slice().sort(function(a,b){
    var order={growing:0,plant_now:1,waiting:2,empty:3};
    if(order[a.status]!==order[b.status])return order[a.status]-order[b.status];
    if(a.status==="growing")return a.remaining-b.remaining;
    if(a.status==="waiting")return a.waitDays-b.waitDays;
    return 0;
  });
  if(rotation.length){
    h+='<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px">';
    rotation.forEach(function(r){
      var c="var(--text3)",bg="var(--bg3)",txt="";
      if(r.status==="plant_now"){c="var(--green)";bg="#4ade8020";txt="🌱 Plant Now";}
      else if(r.status==="waiting"){c="#fbbf24";bg="#fbbf2420";txt="Wait "+r.waitDays+"d";}
      else if(r.status==="growing"){c="#60a5fa";bg="#60a5fa20";txt=r.remaining+"d to harvest";}
      h+='<div onclick="patch({selectedZone:\''+r.key+'\'})" style="flex-shrink:0;border:1px solid '+c+'40;background:'+bg+';border-radius:10px;padding:6px 10px;cursor:pointer">';
      h+='<div style="font-size:9px;color:var(--text3);font-family:\'DM Mono\',monospace">'+esc(r.label.replace(" 🔒",""))+'</div>';
      h+='<div style="font-size:11px;font-weight:600;color:'+c+'">'+txt+'</div></div>';
    });
    h+='</div>';
  }

  var lightH=Number(D.setup.lightHeight)||135;
  var canopyMax=Number(D.setup.canopyMax)||90;
  var netH=Number(D.setup.netHeight)||55;
  h+='<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">';
  h+='<div style="position:relative;flex:1;height:4px;background:var(--border2);border-radius:4px">';
  [0,netH,canopyMax,lightH].forEach(function(cm){
    h+='<div style="position:absolute;top:-4px;left:'+((cm/lightH)*100)+'%;width:2px;height:12px;background:var(--text3)"></div>';
  });
  h+='</div></div>';
  h+='<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);font-family:\'DM Mono\',monospace;margin-bottom:16px">';
  h+='<span>0 floor</span><span>'+netH+' net</span><span>'+canopyMax+' canopy</span><span>'+lightH+' light</span></div>';

  // Configurable zone grid
  var rotMap={};
  getZoneRotation().forEach(function(r){rotMap[r.key]=r;});
  function cellFor(key){
    if(!key)return '<div></div>';
    var p=D.plants.find(function(x){return !x.harvested&&x.position===key;});
    var active=S.selectedZone===key;
    var locked=(D.setup.perpetualZones||[]).indexOf(key)>-1;
    var label=zoneLabel(key)+(locked?' 🔒':"")+' · '+getZonePotSize(key)+'L';
    var border=active?"var(--green)":"var(--border)";
    var bg=active?"#4ade8015":"var(--bg2)";
    var name=p?(PLANT_TYPES.find(function(t){return t.key===(p.plantType||"cannabis");}).icon+" "+esc(p.name)+(p.isPerpetual?' ♻️':"")):(locked?"— perpetual, empty —":"— empty —");
    var sub=p?esc(p.strain||""):"Tap to assign";
    var feedTag="";
    if(p){
      var d=daysSince(p.startDate);
      var t=getFeedPlanFor(p,d);
      var mix=t.isRealProduct?(t.bottles.length?t.bottles.map(function(b){return b.name.slice(0,3)+b.mlPerL;}).join(" "):""):[["S",t.starter],["G",t.grow],["B",t.bloom],["PK",t.pk],["Bo",t.booster]].filter(function(m){return m[1]>0;}).map(function(m){return m[0]+m[1];}).join(" ");
      feedTag='<div style="font-size:9px;color:var(--green);font-family:\'DM Mono\',monospace;margin-top:2px">'+(mix||"water only")+'</div>';
    }
    if(!p&&locked&&rotMap[key]){
      var r=rotMap[key];
      if(r.status==="plant_now")feedTag='<div style="font-size:9px;color:var(--green);font-family:\'DM Mono\',monospace;margin-top:2px">🌱 Plant Now</div>';
      else if(r.status==="waiting")feedTag='<div style="font-size:9px;color:#fbbf24;font-family:\'DM Mono\',monospace;margin-top:2px">Wait '+r.waitDays+'d</div>';
    }
    return '<button onclick="patch({selectedZone:\''+key+'\'})" style="text-align:left;border:1.5px solid '+border+';background:'+bg+';border-radius:14px;padding:10px;min-height:88px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer">'
      +'<div style="font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:\'DM Mono\',monospace">'+label+'</div>'
      +'<div style="font-size:13px;font-weight:600;color:'+(p?"var(--text)":"var(--text3)")+';margin-top:3px">'+name+'</div>'
      +'<div style="font-size:10px;color:var(--text3)">'+sub+'</div>'+feedTag+'</button>';
  }
  // Layout-specific grid arrangement
  var layout=D.setup.zoneLayout;
  var rows=[];
  if(layout==="5z_ushape")rows=[["backLeft","backCenter","backRight"],["frontLeft",null,"frontRight"]];
  else if(layout==="7z_ushape")rows=[["backLeft","backCenter","backRight"],["midLeft",null,"midRight"],["frontLeft",null,"frontRight"]];
  else if(layout==="4z_grid")rows=[["backLeft","backRight"],["frontLeft","frontRight"]];
  else if(layout==="6z_grid")rows=[["backLeft","backCenter","backRight"],["frontLeft","frontCenter","frontRight"]];
  else if(layout==="9z_grid")rows=[["r1c1","r1c2","r1c3"],["r2c1","r2c2","r2c3"],["r3c1","r3c2","r3c3"]];
  else rows=[["center"]];
  rows.forEach(function(row,i){
    h+='<div style="display:grid;grid-template-columns:repeat('+row.length+',1fr);gap:8px;margin-bottom:'+(i===rows.length-1?"18px":"8px")+'">';
    h+=row.map(cellFor).join("");
    h+='</div>';
  });

  // Detail panel for selected zone
  var sel=D.plants.find(function(x){return !x.harvested&&x.position===S.selectedZone;});
  var zoneLocked=(D.setup.perpetualZones||[]).indexOf(S.selectedZone)>-1;
  var zonePot=getZonePotSize(S.selectedZone);
  h+='<div class="card card-pad">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  h+='<div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:\'DM Mono\',monospace">'+zoneLabel(S.selectedZone)+'</div>';
  h+='<button onclick="togglePerpetualZone(\''+S.selectedZone+'\')" style="background:'+(zoneLocked?"#a78bfa20":"var(--bg3)")+';border:1px solid '+(zoneLocked?"#a78bfa40":"var(--border2)")+';border-radius:100px;padding:4px 10px;font-size:11px;font-weight:600;color:'+(zoneLocked?"#a78bfa":"var(--text3)")+';cursor:pointer">'+(zoneLocked?"🔒 Perpetual Pot":"🔓 Make Perpetual")+'</button>';
  h+='</div>';
  h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
  h+='<span style="font-size:11px;color:var(--text3)">🪴 Pot Size:</span>';
  h+='<select onchange="setZonePotSize(\''+S.selectedZone+'\',this.value)" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:8px;padding:5px 8px;color:var(--text);font-size:12px">';
  [3,5,7,9,11,15,19,25].forEach(function(L){
    h+='<option value="'+L+'" '+(zonePot===L?"selected":"")+'>'+L+'L</option>';
  });
  h+='</select>';
  h+='</div>';
  if(!sel){
    h+='<div style="font-size:13px;color:var(--text3)">'+(zoneLocked?"This pot is locked as Perpetual — the next plant you add here will auto-join the rotation.":"No plant assigned to this position.")+'</div>';
    h+='<button onclick="patch({showAddPlant:true,newPlant:Object.assign({},S.newPlant,{position:\''+S.selectedZone+'\',isPerpetual:'+(zoneLocked)+'})})" class="btn btn-green" style="width:100%;margin-top:12px">+ Add Plant Here</button>';
  }else{
    var days=daysSince(sel.startDate);
    var totalDays=plantTotalDays(sel);
    var stage=getStageFor(sel,days,totalDays);
    var water=getWaterSchedule(D.setup,stage,days);
    var tc=getFeedPlanFor(sel,days);
    var typeLbl=plantTypeLabel(sel.plantType);
    var learned=getLearnedFeed(sel,days);
    h+='<div style="font-size:16px;font-weight:700;color:var(--text)">'+stage.icon+' '+esc(sel.name)+'</div>';
    h+='<div style="font-size:12px;color:var(--text3);margin-bottom:10px;font-family:\'DM Mono\',monospace">'+typeLbl+' · '+esc(sel.strain||"Unknown variety")+' · Day '+days+'</div>';
    h+='<div style="display:inline-block;background:'+stage.color+'20;border:1px solid '+stage.color+'40;border-radius:100px;padding:3px 10px;font-size:11px;font-weight:600;color:'+stage.color+';margin-bottom:12px">'+stage.name+'</div>';
    if(sel.plantType==="tomato"&&stage.key==="flowerset"){
      h+='<button data-pid="'+sel.id+'" onclick="markFruitingStarted(this.dataset.pid)" style="display:block;margin-bottom:12px;background:#fb923c15;border:1px solid #fb923c30;border-radius:10px;padding:8px;font-size:12px;font-weight:600;color:#fb923c;cursor:pointer;width:100%">🍅 Mark Fruiting Started</button>';
    }
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
    h+=infoCell("💧","Water",water);
    h+=infoCell("⚗️","Target pH",getTargetPH(D.setup));
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">';
    h+=infoCell("🧪","Suggested","Wk"+tc.week+" "+(tc.isRealProduct?(tc.bottles.length?tc.bottles.length+" bottle"+(tc.bottles.length>1?"s":""):"Water only"):tc.note));
    h+='</div>';
    h+='<div style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:8px">';
    h+='<div style="font-size:10px;color:var(--text3);font-family:\'DM Mono\',monospace;margin-bottom:4px">'+(tc.isRealProduct?esc(tc.brandLabel).toUpperCase()+" — THIS WEEK"+(tc.strengthMult&&tc.strengthMult<1?" · "+Math.round(tc.strengthMult*100)+"% strength (auto)":""):"SUGGESTED MIX (per L, this week)")+'</div>';
    if(tc.isRealProduct){
      h+='<div style="font-size:12px;color:var(--text2)">'+(tc.bottles.length?tc.bottles.map(function(b){return esc(b.name)+" "+b.mlPerL+"ml/L";}).join(" · "):"Water only — no feeding this week")+'</div>';
    }else{
      h+='<div style="font-size:12px;color:var(--text2)">Starter '+tc.starter+' · Grow '+tc.grow+' · Bloom '+tc.bloom+' · PK '+tc.pk+' · Booster '+tc.booster+'</div>';
    }
    h+='</div>';
    if(learned){
      h+='<div style="background:#a78bfa15;border:1px solid #a78bfa30;border-radius:10px;padding:10px;margin-bottom:12px">';
      h+='<div style="font-size:10px;color:#a78bfa;font-family:\'DM Mono\',monospace;margin-bottom:4px">🧠 LEARNED FROM YOUR HISTORY ('+learned.sampleSize+' feed'+(learned.sampleSize>1?"s":"")+(learned.matchedStage?" at this stage":" — overall avg")+')</div>';
      h+='<div style="font-size:12px;color:var(--text2)">'+learned.nutrients.map(function(n){return esc(n.name)+" "+n.avgMlPerL+"ml/L";}).join(" · ")+'</div>';
      h+='</div>';
    }else{
      h+='<div style="margin-bottom:12px"></div>';
    }
    var plog=D.logs[sel.id]||[];
    var last=plog.length?plog[plog.length-1]:null;
    if(last){
      h+='<div style="font-size:11px;color:var(--text3);margin-bottom:10px">Last entry '+last.date+': '+(last.nutrient?"🧪 "+esc(last.nutrient)+(last.mlPerL?" @"+esc(last.mlPerL)+"ml/L":""):esc(last.notes||""))+'</div>';
    }
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    h+='<button data-pid="'+sel.id+'" onclick="openFeed(this.dataset.pid)" style="background:#4ade8015;border:1.5px solid #4ade8030;border-radius:10px;padding:10px;color:var(--green);cursor:pointer;font-size:13px;font-weight:600">🧪 Feed / Water</button>';
    h+='<button data-pid="'+sel.id+'" onclick="openQuickNote(this.dataset.pid)" style="background:#60a5fa15;border:1.5px solid #60a5fa30;border-radius:10px;padding:10px;color:#60a5fa;cursor:pointer;font-size:13px;font-weight:600">✂️ Trim / Action</button>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">';
    h+='<button data-pid="'+sel.id+'" onclick="openLog(this.dataset.pid)" style="background:#a78bfa15;border:1.5px solid #a78bfa30;border-radius:10px;padding:10px;color:#a78bfa;cursor:pointer;font-size:13px;font-weight:600">📏 Log Height/Photo</button>';
    h+='<button data-pid="'+sel.id+'" onclick="openLogHistory(this.dataset.pid)" style="background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;padding:10px;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600">📜 Log History</button>';
    h+='</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">';
    h+='<button data-pid="'+sel.id+'" onclick="if(confirm(\''+esc(sel.name).replace(/'/g,"\\'")+' — mark as harvested?\'))markHarvested(this.dataset.pid)" style="background:#fb923c15;border:1.5px solid #fb923c30;border-radius:10px;padding:10px;color:#fb923c;cursor:pointer;font-size:13px;font-weight:600;grid-column:1/-1">🌾 Harvest</button>';
    h+='</div>';
    h+='<button data-pid="'+sel.id+'" onclick="openEditPlant(this.dataset.pid)" class="btn btn-outline" style="width:100%">✏️ Edit / Reassign Position</button>';
  }
  h+='</div>';
  return h;
}

// ── TODAY TAB ────────────────────────────────────────────
function tabToday(){
  if(D.plants.length===0)return'<div style="text-align:center;padding:48px 20px;color:var(--text3)">Add a plant first to see today\'s tasks</div>';
  var h='<div style="font-size:13px;color:var(--text2);margin-bottom:14px">'+new Date().toDateString()+'</div>';
  D.plants.filter(function(p){return !p.harvested;}).forEach(function(p){
    var days=daysSince(p.startDate);
    var totalDays=plantTotalDays(p);
    var stage=getStageFor(p,days,totalDays);
    var tips=getWeeklyTips(days,D.setup);
    var water=getWaterSchedule(D.setup,stage,days);
    var dist=getLightDistance(D.setup,stage);
    var week=Math.floor(days/7)+1;
    var nutriRow=TERRA_CANNA[Math.min(week-1,TERRA_CANNA.length-1)];
    h+='<div class="card" style="margin-bottom:12px">';
    h+='<div style="padding:12px 14px;background:'+stage.color+'10;border-bottom:1px solid var(--border)">';
    h+='<div style="font-size:14px;font-weight:700;color:var(--text)">'+stage.icon+' '+esc(p.name)+'</div>';
    h+='<div style="font-size:11px;color:'+stage.color+';font-family:\'DM Mono\',monospace">Day '+days+' | Week '+week+' | '+stage.name+'</div>';
    h+='</div>';
    h+='<div style="padding:12px 14px">';
    // Checklist items
    var targetPH=getTargetPH(D.setup);
    var tasks=[
      {icon:"💧",title:"Water",detail:water+" · target pH "+targetPH},
      {icon:"💡",title:"Light Distance",detail:dist.min+"–"+dist.max+"cm — "+dist.note},
      {icon:"🌡️",title:"Environment",detail:"Temp: 22-26°C | Humidity: "+(stage.key==="flower"?"40-50%":"55-70%")},
    ];
    var tc=getFeedPlanFor(p,days);
    if(tc.isRealProduct){
      if(tc.bottles.length){

  if(perp.nextHarvest){
    h+='<div style="background:var(--green)10;border:1.5px solid var(--green)25;border-radius:14px;padding:14px;margin-bottom:12px">';
    h+='<div style="font-size:11px;color:var(--green);font-weight:600;margin-bottom:4px">🌺 NEXT HARVEST</div>';

  h+='<div style="font-size:12px;color:var(--text2);margin-top:4px">'+(perp.openSlots>0?"You have "+perp.openSlots+" open slot(s) — plant today.":"Earliest slot frees up on this date.")+'</div>';
  h+='</div>';

  // Visual timeline of active plants
  if(D.plants.filter(function(p){return !p.harvested;}).length>0){
    h+='<div class="card card-pad">';
    h+='<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:12px">📅 Active Plant Timeline</div>';
    D.plants.filter(function(p){return !p.harvested;}).forEach(function(p){
      var days=daysSince(p.startDate);
      var totalDays=plantTotalDays(p);
      var stage=getStageFor(p,days,totalDays);
      var isOngoing=plant_isOngoing(p,stage);
      var pct=isOngoing?100:Math.min((days/totalDays)*100,100);
      h+='<div style="margin-bottom:10px">';
      h+='<div style="display:flex;justify-content:space-between;margin-bottom:4px">';
      h+='<span style="font-size:12px;color:var(--text);font-weight:500">'+stage.icon+' '+esc(p.name)+'</span>';
      h+='<span style="font-size:11px;color:'+stage.color+';font-family:\'DM Mono\',monospace">'+(isOngoing?"Day "+days:"Day "+days+'/'+totalDays)+'</span>';
      h+='</div>';
      if(!isOngoing){
        h+='<div class="pt" style="height:8px"><div class="pb" style="width:'+pct+'%;background:linear-gradient(90deg,'+stage.color+','+stage.color+'66);height:8px"></div></div>';
      }
      h+='<div style="font-size:10px;color:var(--text3);margin-top:2px">'+stage.name+(isOngoing?"":' — harvest '+(p.harvestDate||addDays(p.startDate,totalDays)))+'</div>';
      h+='</div>';
    });
    h+='</div>';
  }else{
    h+='<div style="text-align:center;padding:32px 20px;color:var(--text3)">Add plants to see your perpetual harvest plan</div>';
  }
  return h;
}

function submitEditPantry(){

  var sizeMl=Number((document.getElementById("ep-pantry-size")||{}).value)||item.sizeMl;
  var mlInput=document.getElementById("ep-pantry-ml");
  var fillInput=document.getElementById("ep-pantry-fill");
  var remainingMl;
  // if the ml field differs from what fill% alone would produce, trust ml field (last edited wins via oninput sync above)
  remainingMl=Number(mlInput.value);
  if(isNaN(remainingMl))remainingMl=Math.round(sizeMl*((Number(fillInput.value)||0)/100));
  item.sizeMl=sizeMl;
  item.remainingMl=Math.max(0,Math.min(sizeMl,remainingMl));

function handleLogPhotoSelect(input){
  var file=input.files&&input.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var maxDim=800;
      var w=img.width,h=img.height;
      if(w>h&&w>maxDim){h=Math.round(h*(maxDim/w));w=maxDim;}
      else if(h>maxDim){w=Math.round(w*(maxDim/h));h=maxDim;}
      var canvas=document.createElement("canvas");
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      var compressed=canvas.toDataURL("image/jpeg",0.6);
      patch({newLog:Object.assign({},S.newLog,{photo:compressed})});
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function togglePerpetualZone(key){

    if(occ)occ.isPerpetual=false;
    showToast(zoneLabel(key)+" unlocked");
  }else{
    zones.push(key);
    var occ2=D.plants.find(function(x){return !x.harvested&&x.position===key;});
    if(occ2)occ2.isPerpetual=true;
    showToast("🔒 "+zoneLabel(key)+" locked as Perpetual");
  }
  D.setup.perpetualZones=zones;
  saveD(D);render();

    id:uid(),brandKey:brandKey,bottleKey:bottleKey,name:bottle.name,
    dose:bottle.dose,sizeMl:sizeMl,remainingMl:Math.round(sizeMl*(fillPct/100))
  });

}
function addPantryStarterPack(brandKey,sizeMl,fillPct){
  var brand=NUTRIENT_BRANDS[brandKey];
  if(!brand)return;
  (brand.starterPackBottles||[]).forEach(function(bk){
    addPantryBottleFromCatalogSilent(brandKey,bk,sizeMl,fillPct);

  if(!name)return;

  fillPct=fillPct===undefined?100:Number(fillPct);
  mlPerL=Number(mlPerL)||0;
  D.pantry.push({
    id:uid(),brandKey:"custom",bottleKey:"custom_"+uid(),name:name,
    dose:{rooting:0,veg:mlPerL,transition:mlPerL,flower:mlPerL,lateFlower:mlPerL,flush:0},
    sizeMl:sizeMl,remainingMl:Math.round(sizeMl*(fillPct/100))
  });

function removePantryBottle(id){

function deductFromPantry(pantryId,mlUsed){
  var item=D.pantry.find(function(b){return b.id===pantryId;});
  if(!item)return;
  item.remainingMl=Math.max(0,Math.round((item.remainingMl-mlUsed)*10)/10);
  saveD(D);
}
function pantryPct(item){
  if(!item.sizeMl)return 100;
  return Math.max(0,Math.min(100,Math.round((item.remainingMl/item.sizeMl)*100)));
}

  D.setup.lightModel=(document.getElementById("tc-light")||{}).value||D.setup.lightModel;
  D.setup.lightWatts=(document.getElementById("tc-watts")||{}).value||D.setup.lightWatts;
  D.setup.lightHeight=(document.getElementById("tc-lightheight")||{}).value||D.setup.lightHeight;
  D.setup.canopyMax=(document.getElementById("tc-canopy")||{}).value||D.setup.canopyMax;
  D.setup.netHeight=(document.getElementById("tc-netheight")||{}).value||D.setup.netHeight;
  D.setup.potSize=(document.getElementById("tc-pot")||{}).value||D.setup.potSize;
  D.setup.zoneLayout=(document.getElementById("tc-layout")||{}).value||D.setup.zoneLayout;
  saveD(D);patch({showTentConfig:false});showToast("⚙️ Tent configuration saved!");
}

function openFeed(pid){
  var p=D.plants.find(function(x){return x.id===pid;});
  var defaultRows=[{name:"",mlPerL:"",pantryId:""}];
  var defaultWater="";
  if(p){
    var plog=(D.logs[pid]||[]).filter(function(l){return l.fed&&l.nutrients&&l.nutrients.length;});
    if(plog.length){
      var last=plog[plog.length-1];
      defaultRows=last.nutrients.map(function(n){return{name:n.name,mlPerL:n.mlPerL,pantryId:n.pantryId||""};});
      defaultWater=last.waterAmount||"";
    }else{
      var days=daysSince(p.startDate);
      var tc=getFeedPlanFor(p,days);
      if(tc.isRealProduct&&tc.bottles.length){
        defaultRows=tc.bottles.map(function(b){return{name:b.name,mlPerL:String(b.mlPerL),pantryId:b.pantryId||""};});
      }
    }
  }
  patch({showFeed:true,activePlantId:pid,newFeed:{date:tod(),nutrients:defaultRows,waterAmount:defaultWater,notes:""}});
}
function readFeedRowsFromDOM(){
  var rows=document.querySelectorAll('[data-feedrow]');
  var out=[];
  rows.forEach(function(row){
    var i=row.getAttribute('data-feedrow');
    var nameEl=document.querySelector('[data-fd-name="'+i+'"]');
    var mlEl=document.querySelector('[data-fd-ml="'+i+'"]');
    var pidEl=document.querySelector('[data-fd-pantry="'+i+'"]');
    out.push({name:nameEl?nameEl.value:"",mlPerL:mlEl?mlEl.value:"",pantryId:pidEl?pidEl.value:""});
  });
  return out.length?out:[{name:"",mlPerL:"",pantryId:""}];
}
function prefillFeedFromSuggestion(){
  var pid=S.activePlantId;if(!pid)return;
  var p=D.plants.find(function(x){return x.id===pid;});if(!p)return;
  var days=daysSince(p.startDate);
  var tc=getFeedPlanFor(p,days);
  if(!tc.isRealProduct||!tc.bottles.length)return;
  var rows=tc.bottles.map(function(b){return{name:b.name,mlPerL:String(b.mlPerL),pantryId:b.pantryId||""};});
  patch({newFeed:Object.assign({},S.newFeed,{nutrients:rows})});
}

function addFeedRow(){
  var rows=readFeedRowsFromDOM();
  rows.push({name:"",mlPerL:"",pantryId:""});
  patch({newFeed:Object.assign({},S.newFeed,{nutrients:rows})});
}
function removeFeedRow(i){
  var rows=readFeedRowsFromDOM();
  rows.splice(i,1);
  if(!rows.length)rows.push({name:"",mlPerL:"",pantryId:""});
  patch({newFeed:Object.assign({},S.newFeed,{nutrients:rows})});
}
function submitFeed(){
  var pid=S.activePlantId;if(!pid)return;
  var p=D.plants.find(function(x){return x.id===pid;});if(!p)return;
  var date=(document.getElementById("fd-date")||{}).value||tod();
  var nutrients=readFeedRowsFromDOM().filter(function(n){return n.name||n.mlPerL;});
  var waterAmount=(document.getElementById("fd-water")||{}).value||"";
  var notes=(document.getElementById("fd-notes")||{}).value||"";
  var nutrientSummary=nutrients.map(function(n){return n.name+(n.mlPerL?" @"+n.mlPerL+"ml/L":"");}).join(", ");
  var liters=Number(waterAmount)||0;
  nutrients.forEach(function(n){
    if(n.pantryId&&n.mlPerL&&liters>0){
      deductFromPantry(n.pantryId,Number(n.mlPerL)*liters);
    }
  });
  if(!D.logs[pid])D.logs[pid]=[];
  D.logs[pid].push({id:uid(),date:date,height:"",watered:true,fed:true,nutrients:nutrients,nutrient:nutrientSummary,waterAmount:waterAmount,notes:notes});
  saveD(D);patch({showFeed:false});showToast("🧪 Feed logged for "+p.name);
}

function openQuickNote(pid){
  patch({showQuickNote:true,activePlantId:pid,newQuickNote:{date:tod(),notes:""}});
}
function submitQuickNote(){
  var pid=S.activePlantId;if(!pid)return;
  var p=D.plants.find(function(x){return x.id===pid;});if(!p)return;
  var date=(document.getElementById("qn-date")||{}).value||tod();
  var notes=(document.getElementById("qn-notes")||{}).value||"";
  if(!D.logs[pid])D.logs[pid]=[];
  D.logs[pid].push({id:uid(),date:date,height:"",watered:false,fed:false,notes:notes||"Trim / maintenance"});
  saveD(D);patch({showQuickNote:false});showToast("✂️ Logged for "+p.name);
}

function openEditPlant(pid){
  var p=D.plants.find(function(x){return x.id===pid;});
  if(!p)return;
  patch({showEditPlant:true,editingPlantId:pid});
}

function submitEditPlant(){
  var pid=S.editingPlantId;var p=D.plants.find(function(x){return x.id===pid;});if(!p)return;
  p.name=(document.getElementById("ep-name")||{}).value||p.name;
  p.strain=(document.getElementById("ep-strain")||{}).value||p.strain;
  p.plantType=(document.getElementById("ep-plantType")||{}).value||p.plantType||"cannabis";
  p.startDate=(document.getElementById("ep-date")||{}).value||p.startDate;
  p.totalDays=(document.getElementById("ep-days")||{}).value||p.totalDays;
  p.harvestDate=(document.getElementById("ep-harvest")||{}).value||p.harvestDate;
  p.position=(document.getElementById("ep-position")||{}).value||"";
  p.isPerpetual=p.isPerpetual||(D.setup.perpetualZones||[]).indexOf(p.position)>-1;
  saveD(D);patch({showEditPlant:false,editingPlantId:null});showToast("Plant updated!");
}

function deletePlant(pid){
  D.plants=D.plants.filter(function(p){return p.id!==pid;});
  delete D.logs[pid];
  saveD(D);render();showToast("Plant removed","#f87171");
}

function savePerp(){
  D.setup.numSlots=(document.getElementById("p-slots")||{}).value||"1";
  D.setup.avgFlowerDays=(document.getElementById("p-days")||{}).value||"77";
  saveD(D);render();showToast("Perpetual settings saved!");
}

function openAdvisor(){patch({showAdvisor:true,advisorLoading:false,advisorText:""});}

async function runAdvisor(){
  patch({advisorLoading:true,advisorText:""});
  var nl="\n";
  var summary="GROW SETUP:"+nl;
  summary+="Light: "+D.setup.lightModel+" ("+D.setup.lightWatts+"W) | Schedule: "+D.setup.lightSchedule+nl;
  summary+="Tent: "+D.setup.tentSize+" | Medium: "+D.setup.medium+" | Pot: "+D.setup.potSize+"L"+nl;
  summary+="pH monitoring: "+(D.setup.phing?"Yes":"No")+nl+nl;
  if(D.plants.length>0){
    summary+="PLANTS:"+nl;
    D.plants.forEach(function(p){
      var days=daysSince(p.startDate);
      var stage=getStageFor(p,days,Number(p.totalDays)||77);
      var logs=D.logs[p.id]||[];
      summary+=p.name+" ("+p.strain+") — Day "+days+" — "+stage.name+nl;
      if(logs.length>0){
        var last=logs[logs.length-1];
        summary+="  Last log: height="+( last.height||"not recorded")+"cm, watered="+last.watered+", notes="+( last.notes||"none")+nl;
      }
    });
  }
  var prompt="You are an expert autoflower cannabis grower and nutrient advisor. The user is a beginner with a "+D.setup.tentSize+"cm tent and "+D.setup.lightModel+". Analyze their grow data and give specific beginner-friendly advice. Be encouraging, practical, and specific. Cover: current plant health based on stage, what to do this week, any concerns, and one tip they might not know. Keep it conversational and clear. Data:"+nl+nl+summary;
  try{
    var resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:prompt}]})
    });
    var data=await resp.json();
    var text=data.content&&data.content[0]?data.content[0].text:"Could not get advice right now.";
    patch({advisorLoading:false,advisorText:text});
  }catch(e){
    patch({advisorLoading:false,advisorText:"Could not connect. Check your internet and try again."});
  }
}

render();
</script>
